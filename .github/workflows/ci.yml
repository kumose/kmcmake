name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

# Primary: x-ci v2 bootstraps kmpkg per platform. Optional empty toolchain is
# still valid — see no-kmpkg jobs for that path.
#
# Skip policy (same as former v1): no macos-x86, no windows-arm64, no alpine-arm.
jobs:
  ubuntu:
    uses: kumose/x-ci/.github/workflows/ubuntu.yml@v2
    with:
      config-command: |
        cmake -S template -B build-template -DCHANGEME=testproj -DCMAKE_BUILD_TYPE=Release
        cmake --install build-template --prefix /tmp/testproj
        cmake --preset=default -S /tmp/testproj -DKMCMAKE_BUILD_TEST=ON -DCMAKE_BUILD_TYPE=Release
      build-command: |
        cmake --build /tmp/testproj/build --parallel
      test-command: |
        ctest --test-dir /tmp/testproj/build --output-on-failure -j1

  alpine:
    uses: kumose/x-ci/.github/workflows/alpine.yml@v2
    with:
      skip-arm: true
      config-command: |
        cmake -S template -B build-template -DCHANGEME=testproj -DCMAKE_BUILD_TYPE=Release
        cmake --install build-template --prefix /tmp/testproj
        cmake --preset=default -S /tmp/testproj -DKMCMAKE_BUILD_TEST=ON -DCMAKE_BUILD_TYPE=Release
      build-command: |
        cmake --build /tmp/testproj/build --parallel
      test-command: |
        ctest --test-dir /tmp/testproj/build --output-on-failure -j1

  centos:
    uses: kumose/x-ci/.github/workflows/centos.yml@v2
    with:
      config-command: |
        cmake -S template -B build-template -DCHANGEME=testproj -DCMAKE_BUILD_TYPE=Release
        cmake --install build-template --prefix /tmp/testproj
        cmake --preset=default -S /tmp/testproj -DKMCMAKE_BUILD_TEST=ON -DCMAKE_BUILD_TYPE=Release
      build-command: |
        cmake --build /tmp/testproj/build --parallel
      test-command: |
        ctest --test-dir /tmp/testproj/build --output-on-failure -j1

  mac:
    uses: kumose/x-ci/.github/workflows/mac.yml@v2
    with:
      skip-amd: true
      config-command: |
        cmake -S template -B build-template -DCHANGEME=testproj -DCMAKE_BUILD_TYPE=Release
        cmake --install build-template --prefix /tmp/testproj
        cmake --preset=default -S /tmp/testproj -DKMCMAKE_BUILD_TEST=ON -DCMAKE_BUILD_TYPE=Release
      build-command: |
        cmake --build /tmp/testproj/build --parallel
      test-command: |
        ctest --test-dir /tmp/testproj/build --output-on-failure -j1

  # MSVC + Ninja (x-ci v2 windows); env sets CMAKE_MAKE_PROGRAM after bootstrap.
  windows:
    uses: kumose/x-ci/.github/workflows/windows.yml@v2
    with:
      skip-arm: true
      config-command: |
        cmake -S template -B build-template -DCHANGEME=testproj -DCMAKE_BUILD_TYPE=Release
        cmake --install build-template --prefix "$env:RUNNER_TEMP/testproj"
        Set-Location "$env:RUNNER_TEMP/testproj"
        if (-not (Get-Command cl -ErrorAction SilentlyContinue)) {
          throw "cl.exe not on PATH after msvc-dev-cmd"
        }
        $ninja = $env:CMAKE_MAKE_PROGRAM
        if (-not $ninja) {
          $ninja = (Get-Command ninja -ErrorAction Stop).Source
        }
        if (-not (Test-Path $ninja)) {
          throw "ninja not found at $ninja"
        }
        & $ninja --version | Out-Host
        if (-not $env:KMPKG_CMAKE) {
          throw "KMPKG_CMAKE is not set"
        }
        cmake --preset=ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER=cl `
          -DCMAKE_CXX_COMPILER=cl `
          -DCMAKE_MAKE_PROGRAM="$ninja" `
          -DKMCMAKE_BUILD_TEST=ON
      build-command: |
        Set-Location "$env:RUNNER_TEMP/testproj"
        if (-not (Get-Command nproc -ErrorAction SilentlyContinue)) {
          function global:nproc { [Environment]::ProcessorCount }
        }
        cmake --build build-ninja --parallel
      test-command: |
        Set-Location "$env:RUNNER_TEMP/testproj"
        ctest --test-dir build-ninja --output-on-failure -j1

  # Standalone: no kmpkg bootstrap — empty $KMPKG_CMAKE / toolchain.
  no-kmpkg:
    name: no-kmpkg ${{ matrix.os }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: default
            build_dir: build
          - os: ubuntu-latest
            preset: ninja
            build_dir: build-ninja
          - os: macos-latest
            preset: default
            build_dir: build

    steps:
      - uses: actions/checkout@v4

      - name: Install ninja
        if: matrix.preset == 'ninja'
        run: |
          if [ "$(uname)" = "Darwin" ]; then
            brew install ninja
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq ninja-build
          fi

      - name: Configure template
        run: >
          cmake -S template -B build-template
          -DCHANGEME=testproj
          -DCMAKE_BUILD_TYPE=Release

      - name: Install generated project
        run: cmake --install build-template --prefix ${{ runner.temp }}/testproj

      - name: Configure generated project (empty toolchain)
        working-directory: ${{ runner.temp }}/testproj
        env:
          KMPKG_CMAKE: ""
        run: >
          cmake --preset=${{ matrix.preset }}
          -DKMCMAKE_BUILD_TEST=ON
          -DCMAKE_BUILD_TYPE=Release

      - name: Build generated project
        working-directory: ${{ runner.temp }}/testproj
        run: cmake --build ${{ matrix.build_dir }} --parallel

      - name: Run tests
        working-directory: ${{ runner.temp }}/testproj
        run: ctest --test-dir ${{ matrix.build_dir }} --output-on-failure -j1

  no-kmpkg-centos:
    name: no-kmpkg centos-stream9 (default)
    runs-on: ubuntu-latest
    container: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y gcc-c++ python3-pip git make
          pip3 install cmake

      - name: Configure template
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake -S template -B build-template -DCHANGEME=testproj -DCMAKE_BUILD_TYPE=Release

      - name: Install generated project
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake --install build-template --prefix /tmp/testproj

      - name: Configure generated project (empty toolchain)
        working-directory: /tmp/testproj
        env:
          KMPKG_CMAKE: ""
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake --preset=default -DKMCMAKE_BUILD_TEST=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build generated project
        working-directory: /tmp/testproj
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake --build build --parallel

      - name: Run tests
        working-directory: /tmp/testproj
        run: |
          export PATH="/usr/local/bin:$PATH"
          ctest --test-dir build --output-on-failure -j1
