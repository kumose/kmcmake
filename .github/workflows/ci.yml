name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-20.04
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure template
        run: >
          cmake -S template -B build-template
          -DCHANGEME=testproj
          -DCMAKE_BUILD_TYPE=Release

      - name: Install generated project
        run: cmake --install build-template --prefix ${{ runner.temp }}/testproj

      - name: Configure generated project
        working-directory: ${{ runner.temp }}/testproj
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build generated project
        working-directory: ${{ runner.temp }}/testproj
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: ${{ runner.temp }}/testproj
        run: ctest --test-dir build --output-on-failure

  centos:
    name: centos-stream9
    runs-on: ubuntu-latest
    container: quay.io/centos/centos:stream9
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y gcc-c++ python3-pip git
          pip3 install cmake

      - name: Configure template
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake -S template -B build-template -DCHANGEME=testproj -DCMAKE_BUILD_TYPE=Release

      - name: Install generated project
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake --install build-template --prefix /tmp/testproj

      - name: Configure generated project
        working-directory: /tmp/testproj
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build generated project
        working-directory: /tmp/testproj
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake --build build --parallel

      - name: Run tests
        working-directory: /tmp/testproj
        run: |
          export PATH="/usr/local/bin:$PATH"
          ctest --test-dir build --output-on-failure
